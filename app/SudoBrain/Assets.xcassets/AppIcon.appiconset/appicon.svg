<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="50%" style="stop-color:#7B68EE"/>
      <stop offset="100%" style="stop-color:#9B59B6"/>
    </linearGradient>
    <linearGradient id="glw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- macOS rounded rect background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="512" cy="480" r="280" fill="url(#glw)"/>

  <g filter="url(#g)" transform="translate(512,480)">
    <!-- Terminal chevron > -->
    <path d="M -200 -160 L 0 0 L -200 160"
          fill="none" stroke="url(#accent)" stroke-width="56"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Neural branch: top -->
    <path d="M 0 0 L 160 -100 Q 200 -130 250 -115"
          fill="none" stroke="url(#accent)" stroke-width="32"
          stroke-linecap="round"/>

    <!-- Neural branch: middle -->
    <path d="M 0 0 L 220 0 Q 250 0 270 -15"
          fill="none" stroke="url(#accent)" stroke-width="32"
          stroke-linecap="round"/>

    <!-- Neural branch: bottom -->
    <path d="M 0 0 L 160 100 Q 200 130 250 115"
          fill="none" stroke="url(#accent)" stroke-width="32"
          stroke-linecap="round"/>

    <!-- Synapse endpoint nodes -->
    <circle cx="250" cy="-115" r="20" fill="#6C63FF"/>
    <circle cx="270" cy="-15" r="16" fill="#7B68EE"/>
    <circle cx="250" cy="115" r="20" fill="#9B59B6"/>

    <!-- Inner relay nodes -->
    <circle cx="160" cy="-100" r="10" fill="#6C63FF" opacity="0.7"/>
    <circle cx="220" cy="0" r="10" fill="#7B68EE" opacity="0.7"/>
    <circle cx="160" cy="100" r="10" fill="#9B59B6" opacity="0.7"/>

    <!-- Terminal cursor block -->
    <rect x="50" y="-24" width="48" height="48" rx="4" fill="#6C63FF" opacity="0.55"/>
  </g>
</svg>
