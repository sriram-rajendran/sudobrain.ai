services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-sudobrain}
    ports:
      - "5432:5432"
    volumes:
      - sudobrain-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DATABASE:-sudobrain}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/sudobrain}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - sudobrain-neo4j-data:/data
      - sudobrain-neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "apt-get update &&
             apt-get install -y --no-install-recommends ffmpeg curl &&
             rm -rf /var/lib/apt/lists/* &&
             pip install --no-cache-dir -r backend/requirements.txt &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8420"
    environment:
      SUDOBRAIN_DATA_DIR: /data
      SUDOBRAIN_TRUST_LOCALHOST: "true"
      SUDOBRAIN_SYNC_GMAIL: "false"
      SUDOBRAIN_SYNC_SLACK: "false"
      SUDOBRAIN_SYNC_FATHOM: "false"
      SUDOBRAIN_SYNC_PROJECT_CONTEXT: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-sudobrain}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-sudobrain}
    ports:
      - "8420:8420"
    volumes:
      - .:/app
      - sudobrain-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8420/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  sudobrain-postgres:
  sudobrain-neo4j-data:
  sudobrain-neo4j-logs:
  sudobrain-data:
