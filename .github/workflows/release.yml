name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/package_release.sh "${GITHUB_REF_NAME#v}"
      - run: cd app && swift build -c release
      - name: Archive unsigned Swift build
        run: |
          mkdir -p dist
          tar -czf "dist/sudobrain-macos-${GITHUB_REF_NAME#v}-unsigned.tar.gz" -C app/.build/release SudoBrain
      - name: Notarization status
        run: |
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ] && [ -n "${APPLE_APP_PASSWORD:-}" ]; then
            echo "Apple signing secrets configured; add signing/notarization command here."
          else
            echo "Apple signing secrets are not configured. Publishing unsigned artifacts only."
          fi
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
