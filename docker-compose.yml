services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DATABASE:-sudobrain}
    ports:
      - "5432:5432"
    volumes:
      - sudobrain-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sudobrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:?set NEO4J_AUTH in .env as neo4j/<password>}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - sudobrain-neo4j-data:/data
      - sudobrain-neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sudobrain-postgres:
  sudobrain-neo4j-data:
  sudobrain-neo4j-logs:
